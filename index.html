<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Style.css"/>



<!-- font codes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">







</head>
<body>
   
    
<div class="containerParent">
    <div class="container_1">
        <div class="raitingCard">

            <div class="img_con">
                <img src="images/icon-star.svg" alt="star"/>
            </div>

            <h2>how did we do</h2>

            <p>please let us know how we did with your support request. all feedback is apperciated to help us improve our offering</p>

          <div class="rating_numbers">
            <div class="first_number"  tabindex="0">1</div>
            <div class="second_number" tabindex="0" >2</div>
            <div class="third_number"  tabindex="0">3</div>
            <div class="fourth_number" tabindex="0">4</div>
            <div class="fifth_number"  tabindex="0">5</div>
          </div>
          <button id="send">submit</button>

        </div>
    </div>

    <div class="container_2">
        <div class="thankCard">
            <div class="img_con">
                <img src="images/illustration-thank-you.svg"/>
            </div>
            <div class="message"></div>
           <h3>thank you!</h3>
            <p>we apperciate you taking the time to give a rating. if you ever need more support, don't hesitate to get in touch !</p>

        </div>
    </div>
</div>


















    <script src="main.js"></script>
</body>
</html>
